<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Artistas | SoundWave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">SoundWave</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto" id="lista-menu"></ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="titulo-secao">Cadastro de Artistas</h2>

    
    <div class="caixa-formulario mb-5">
      <input type="hidden" id="artista-id"/>
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Nome</label>
          <input type="text" id="artista-nome" class="form-control campo-entrada" placeholder="Nome do artista"/>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Gênero</label>
          <input type="text" id="artista-genero" class="form-control campo-entrada" placeholder="Ex: Pop / R&B"/>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">País</label>
          <input type="text" id="artista-pais" class="form-control campo-entrada" placeholder="Ex: Brasil"/>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Período de atividade</label>
          <input type="text" id="artista-ano" class="form-control campo-entrada" placeholder="Ex: 2010 – presente"/>
        </div>
        <div class="col-12">
          <label class="form-label">Descrição curta</label>
          <input type="text" id="artista-descricao" class="form-control campo-entrada" placeholder="Uma linha sobre o artista"/>
        </div>
        <div class="col-12">
          <label class="form-label">Biografia completa</label>
          <textarea id="artista-conteudo" class="form-control campo-entrada" rows="3" placeholder="Texto completo sobre o artista"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">URL da imagem</label>
          <input type="text" id="artista-imagem" class="form-control campo-entrada" placeholder="Imagens/nome.jpg"/>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input type="checkbox" id="artista-destaque" class="form-check-input"/>
            <label class="form-check-label" for="artista-destaque">Exibir no carrossel de destaques</label>
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="botao-principal" onclick="salvarArtista()">Salvar</button>
          <button class="botao-secundario" onclick="limparFormulario()">Limpar</button>
        </div>
      </div>
    </div>

    <h4 class="titulo-secao">Artistas cadastrados</h4>
    <div class="tabela-container">
      <table class="tabela-artistas">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Gênero</th>
            <th>País</th>
            <th>Destaque</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>© 2025 SoundWave — Enzo Maciel</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/cadastro_artistas.js"></script>
</body>
</html>
