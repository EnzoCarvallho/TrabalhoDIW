<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | SoundWave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">SoundWave</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto" id="lista-menu"></ul>
    </div>
  </div>
</nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5">

        <!---Login--->

        <div id="form-login" class="caixa-formulario">
          <h2 class="titulo-formulario">Entrar</h2>
          <div id="msg-login" class="mensagem-alerta d-none"></div>
          <div class="mb-3">
            <label class="form-label">Login</label>
            <input type="text" id="login-usuario" class="form-control campo-entrada" placeholder="Seu login"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="login-senha" class="form-control campo-entrada" placeholder="Sua senha"/>
          </div>
          <button class="botao-principal w-100" onclick="fazerLogin()">Entrar</button>
          <p class="mt-3 text-center texto-alternativo">
            Não tem conta? <a href="#" onclick="alternarForm()" class="link-destaque">Cadastre-se</a>
          </p>
        </div>

        <!-- FORMULÁRIO DE CADASTRO -->
        <div id="form-cadastro" class="caixa-formulario d-none">
          <h2 class="titulo-formulario">Criar Conta</h2>
          <div id="msg-cadastro" class="mensagem-alerta d-none"></div>
          <div class="mb-3">
            <label class="form-label">Nome completo</label>
            <input type="text" id="cad-nome" class="form-control campo-entrada"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Login</label>
            <input type="text" id="cad-login" class="form-control campo-entrada"/>
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="cad-email" class="form-control campo-entrada"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="cad-senha" class="form-control campo-entrada"/>
          </div>
          <button class="botao-principal w-100" onclick="fazerCadastro()">Criar conta</button>
          <p class="mt-3 text-center texto-alternativo">
            Já tem conta? <a href="#" onclick="alternarForm()" class="link-destaque">Entrar</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 SoundWave — Enzo Maciel</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/login.js"></script>
  <script src="assets/js/nav.js"></script>
</body>
</html>
